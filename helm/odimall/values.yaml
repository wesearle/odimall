images:
  frontend: wsearle/odimall:frontend

# MySQL storage. Persistent by default (PVC) so data survives pod restarts.
# Set persistence.enabled=false to use ephemeral emptyDir storage instead:
# no StorageClass needed, and the database is re-seeded from the init
# ConfigMap on every restart (handy for kind/minikube or throwaway demos).
mysql:
  persistence:
    enabled: true
    size: 1Gi
    # Leave empty to use the cluster's default StorageClass.
    storageClassName: ""

rum:
  enabled: false
  endpoint: ""
  otlpInsecure: true

rumEnabled: false
rumEndpoint: ""

# ClickStack / HyperDX browser SDK (session replay, RUM, frontend traces).
# Self-hosted: set url to your OTLP HTTP collector (port 4318) and provide an ingestion API key.
clickstack:
  enabled: false
  url: ""
  service: odigear-frontend
  createSecret: true
  secretName: ""
  secretKey: CLICKSTACK_API_KEY
  dummyApiKey: "replace-me-with-your-clickstack-ingestion-key"

clickstackEnabled: false
clickstackUrl: ""

# When true, creates an Odigos Source that disables instrumentation on the frontend Deployment.
# Leave false so Odigos instruments the BFF alongside ClickStack browser SDK (session replay).
odigos:
  excludeFrontend: false

loadGenerator:
  interval: "5s"
  # When true, every other automated order buys Rapid River Kayak (#6) with X-OdiMall-Kayak-Chaos.
  kayakFaultEnabled: false

apiGateway:
  vmPipelineAlphaUrl: ""
  windowsPipelineBaseUrl: ""

alloy:
  image: grafana/alloy:v1.10.2
  stabilityLevel: experimental

# Product blurb: POST /products/{id}/ai-summary
# aiMode=demo — local template, no external LLM.
# aiMode=openai — OpenAI SDK (OPENAI_API_KEY).
# aiMode=gemini — Google Generative AI SDK (GEMINI_API_KEY); enable productService.gemini and patch Secret.
productService:
  aiMode: demo
  openaiModel: gpt-4o-mini
  # New AI Studio keys often cannot use gemini-2.0-flash; 2.5 Flash is the current GA default.
  geminiModel: gemini-2.5-flash
  # Deprecated: use productService.openai.secretName. Still honored if set.
  openaiApiKeySecretName: ""
  openaiApiKeySecretKey: ""
  openai:
    enabled: true
    createSecret: true
    secretName: ""
    secretKey: OPENAI_API_KEY
    dummyApiKey: "sk-replace-me-with-your-openai-key"
  gemini:
    enabled: false
    createSecret: true
    secretName: ""
    secretKey: GEMINI_API_KEY
    dummyApiKey: "replace-me-with-your-gemini-api-key"
  langfuse:
    enabled: false
    baseUrl: "https://cloud.langfuse.com"
    createSecret: true
    secretName: ""
    publicKeySecretKey: LANGFUSE_PUBLIC_KEY
    secretKeySecretKey: LANGFUSE_SECRET_KEY
    dummyPublicKey: "pk-lf-replace-me-with-your-langfuse-public-key"
    dummySecretKey: "sk-lf-replace-me-with-your-langfuse-secret-key"
