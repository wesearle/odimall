apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: odimall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: odimall
    spec:
      containers:
        - name: frontend
          image: {{ .Values.images.frontend | quote }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: API_GATEWAY_URL
              value: "http://api-gateway:8081"
{{- if or .Values.rum.enabled .Values.rumEnabled }}
            - name: RUM_ENABLED
              value: "true"
            - name: RUM_PROXY_TARGET
              value: "http://{{ .Release.Name }}-rum-alloy.{{ .Release.Namespace }}.svc.cluster.local:9998"
{{- end }}
{{- if or .Values.clickstack.enabled .Values.clickstackEnabled }}
{{- $clickstackUrl := include "odimall.clickstack.collectorUrl" . }}
{{- if empty $clickstackUrl }}{{ fail "clickstack.url (or clickstackUrl) is required when clickstack.enabled / clickstackEnabled is true" }}{{ end }}
            - name: CLICKSTACK_ENABLED
              value: "true"
            - name: CLICKSTACK_PROXY_TARGET
              value: {{ $clickstackUrl | quote }}
            - name: CLICKSTACK_SERVICE
              value: {{ .Values.clickstack.service | default "odigear-frontend" | quote }}
            - name: CLICKSTACK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odimall.clickstack.secretName" . }}
                  key: {{ include "odimall.clickstack.secretKey" . }}
{{- end }}
          resources:
            requests:
              memory: {{ if or .Values.clickstack.enabled .Values.clickstackEnabled }}"256Mi"{{ else }}"128Mi"{{ end }}
              cpu: "100m"
            limits:
              memory: {{ if or .Values.clickstack.enabled .Values.clickstackEnabled }}"512Mi"{{ else }}"256Mi"{{ end }}
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
    app.kubernetes.io/part-of: odimall
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
