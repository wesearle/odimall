{{- $defaultName := printf "%s-clickstack-credentials" .Release.Name }}
{{- $secretName := include "odimall.clickstack.secretName" . }}
{{- $createSecret := .Values.clickstack.createSecret | default true }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $defaultName }}
{{- if and (or .Values.clickstack.enabled .Values.clickstackEnabled) $createSecret (eq $secretName $defaultName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: odimall
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    odimall.io/secret-purpose: "ClickStack browser ingestion API key — patch before session replay works"
type: Opaque
{{- if not $existing.metadata }}
stringData:
  {{ include "odimall.clickstack.secretKey" . }}: {{ .Values.clickstack.dummyApiKey | quote }}
{{- end }}
{{- end }}
