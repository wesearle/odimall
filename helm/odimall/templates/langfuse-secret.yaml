{{- $defaultName := printf "%s-langfuse-credentials" .Release.Name }}
{{- $secretName := include "odimall.langfuse.secretName" . }}
{{- $createSecret := .Values.productService.langfuse.createSecret | default true }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $defaultName }}
{{- if and .Values.productService.langfuse.enabled $createSecret (eq $secretName $defaultName) (not $existing) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: odimall
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    odimall.io/secret-purpose: "Langfuse public/secret keys — patch before LLM traces appear"
type: Opaque
stringData:
  {{ include "odimall.langfuse.publicKeySecretKey" . }}: {{ .Values.productService.langfuse.dummyPublicKey | quote }}
  {{ include "odimall.langfuse.secretKeySecretKey" . }}: {{ .Values.productService.langfuse.dummySecretKey | quote }}
{{- end }}
