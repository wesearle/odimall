apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: odimall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: odimall
    spec:
      containers:
        - name: api-gateway
          image: wsearle/odimall:api-gateway
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8083"
            - name: USER_SERVICE_URL
              value: "http://user-service:8084"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8085"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: odimall
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8081
      targetPort: 8081
