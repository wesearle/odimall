apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: product-service
    app.kubernetes.io/part-of: odimall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
        app.kubernetes.io/part-of: odimall
    spec:
      containers:
        - name: product-service
          image: wsearle/odimall:product-service
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "odimall"
            - name: DB_PASSWORD
              value: "odimall123"
            - name: DB_NAME
              value: "odimall"
            - name: ODIMALL_AI_MODE
              value: {{ .Values.productService.aiMode | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.productService.openaiModel | quote }}
            - name: GEMINI_MODEL
              value: {{ .Values.productService.geminiModel | quote }}
{{- if .Values.productService.openai.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odimall.openai.secretName" . | quote }}
                  key: {{ include "odimall.openai.secretKey" . | quote }}
{{- end }}
{{- if .Values.productService.gemini.enabled }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odimall.gemini.secretName" . | quote }}
                  key: {{ include "odimall.gemini.secretKey" . | quote }}
{{- end }}
{{- if .Values.productService.langfuse.enabled }}
            - name: LANGFUSE_ENABLED
              value: "true"
            - name: LANGFUSE_BASE_URL
              value: {{ .Values.productService.langfuse.baseUrl | default "https://cloud.langfuse.com" | quote }}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odimall.langfuse.secretName" . | quote }}
                  key: {{ include "odimall.langfuse.publicKeySecretKey" . | quote }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "odimall.langfuse.secretName" . | quote }}
                  key: {{ include "odimall.langfuse.secretKeySecretKey" . | quote }}
{{- end }}
          resources:
            requests:
              memory: {{ if .Values.productService.langfuse.enabled }}"256Mi"{{ else }}"128Mi"{{ end }}
              cpu: "100m"
            limits:
              memory: {{ if .Values.productService.langfuse.enabled }}"512Mi"{{ else }}"256Mi"{{ end }}
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: product-service
    app.kubernetes.io/part-of: odimall
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
