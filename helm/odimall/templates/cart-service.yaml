apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: cart-service
    app.kubernetes.io/part-of: odimall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        app.kubernetes.io/part-of: odimall
    spec:
      containers:
        - name: cart-service
          image: wsearle/odimall:cart-service
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: cart-service
    app.kubernetes.io/part-of: odimall
spec:
  selector:
    app: cart-service
  ports:
    - port: 8083
      targetPort: 8083
