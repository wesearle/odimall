{{- /* Only create a Helm-managed placeholder when using the default secret name (<release>-openai-credentials). */ -}}
{{- $defaultName := printf "%s-openai-credentials" .Release.Name }}
{{- $secretName := include "odimall.openai.secretName" . }}
{{- if and .Values.productService.openai.enabled .Values.productService.openai.createSecret (eq $secretName $defaultName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: odimall
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{ include "odimall.openai.secretKey" . }}: {{ .Values.productService.openai.dummyApiKey | quote }}
{{- end }}
