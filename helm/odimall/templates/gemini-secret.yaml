{{- $defaultName := printf "%s-gemini-credentials" .Release.Name }}
{{- $secretName := include "odimall.gemini.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $defaultName }}
{{- if and .Values.productService.gemini.enabled .Values.productService.gemini.createSecret (eq $secretName $defaultName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $defaultName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: odimall
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    odimall.io/secret-purpose: "Google AI Studio Gemini API key — patch before aiMode=gemini blurbs work"
type: Opaque
{{- if not $existing.metadata }}
stringData:
  {{ include "odimall.gemini.secretKey" . }}: {{ .Values.productService.gemini.dummyApiKey | quote }}
{{- end }}
{{- end }}
