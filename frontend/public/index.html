<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdiMall — Adventure Gear for Every Trail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="nav-brand" onclick="showCatalog(); return false;">
        <svg class="nav-logo" viewBox="0 0 32 32" fill="none">
          <path d="M16 2L3 28h26L16 2z" fill="#2d6a4f"/>
          <path d="M16 10L9 26h14L16 10z" fill="#40916c"/>
          <circle cx="16" cy="18" r="2" fill="#d4a373"/>
        </svg>
        <span class="nav-brand-text">OdiMall</span>
      </a>
      <p class="nav-tagline">Adventure Gear for Every Trail</p>
      <div class="nav-actions">
        <button class="nav-cart-btn" onclick="showCart()" title="View Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Toast notifications -->
  <div id="toast" class="toast"></div>

  <!-- Page: Catalog -->
  <main id="pageCatalog" class="page">
    <section class="hero">
      <div class="hero-content">
        <h1>Gear Up for Your Next Adventure</h1>
        <p>Premium outdoor equipment trusted by explorers worldwide</p>
      </div>
    </section>
    <div class="container">
      <div class="catalog-header">
        <h2>Our Collection</h2>
        <div class="catalog-filters">
          <button class="filter-btn active" onclick="filterProducts('all')">All</button>
        </div>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <!-- Page: Product Detail -->
  <main id="pageDetail" class="page" style="display:none">
    <div class="container">
      <button class="back-btn" onclick="showCatalog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Catalog
      </button>
      <div class="detail-layout" id="productDetail"></div>
    </div>
  </main>

  <!-- Page: Cart -->
  <main id="pageCart" class="page" style="display:none">
    <div class="container">
      <button class="back-btn" onclick="showCatalog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Continue Shopping
      </button>
      <h2 class="page-title">Your Cart</h2>
      <div id="cartContent"></div>
    </div>
  </main>

  <!-- Page: Checkout -->
  <main id="pageCheckout" class="page" style="display:none">
    <div class="container">
      <button class="back-btn" onclick="showCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Cart
      </button>
      <h2 class="page-title">Checkout</h2>
      <div class="checkout-layout">
        <div class="checkout-form">
          <h3>Shipping Information</h3>
          <form id="shippingForm" onsubmit="placeOrder(event)">
            <div class="form-group">
              <label for="shipName">Full Name</label>
              <input type="text" id="shipName" required placeholder="Jane Explorer">
            </div>
            <div class="form-group">
              <label for="shipAddress">Street Address</label>
              <input type="text" id="shipAddress" required placeholder="123 Mountain Pass">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="shipCity">City</label>
                <input type="text" id="shipCity" required placeholder="Boulder">
              </div>
              <div class="form-group form-group-sm">
                <label for="shipState">State</label>
                <input type="text" id="shipState" required placeholder="CO" maxlength="2">
              </div>
              <div class="form-group form-group-sm">
                <label for="shipZip">ZIP</label>
                <input type="text" id="shipZip" required placeholder="80301" maxlength="10">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" id="placeOrderBtn">
              Place Order
            </button>
          </form>
        </div>
        <div class="checkout-summary" id="checkoutSummary"></div>
      </div>
    </div>
  </main>

  <!-- Page: Confirmation -->
  <main id="pageConfirmation" class="page" style="display:none">
    <div class="container">
      <div class="confirmation-card" id="confirmationContent"></div>
    </div>
  </main>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 OdiMall — Adventure Gear for Every Trail. Demo application.</p>
    </div>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
